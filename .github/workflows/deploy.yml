steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Node
    uses: actions/setup-node@v4
    with:
      node-version: 20
      cache: npm

  - name: Install and Build
    run: |
      npm ci
      npm run build

  - name: Prepare Deploy Path
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_DEPLOY }}
      port: ${{ secrets.VPS_SSH_PORT }}
      script: |
        set -e
        mkdir -p /var/www/tailui.in
        cd /var/www/tailui.in
        rm -rf dist

  - name: Upload Build
    uses: appleboy/scp-action@v0.1.7
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_DEPLOY }}
      port: ${{ secrets.VPS_SSH_PORT }}
      source: "dist"
      target: "/var/www/tailui.in"

  - name: Verify and Reload Nginx
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_HOST }}
      username: ${{ secrets.VPS_USER }}
      key: ${{ secrets.VPS_DEPLOY }}
      port: ${{ secrets.VPS_SSH_PORT }}
      script: |
        set -e
        test -d /var/www/tailui.in/dist
        test -f /var/www/tailui.in/dist/index.html
        systemctl reload nginx